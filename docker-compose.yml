version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: google-dorking-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dorking-network

  flask:
    build: .
    container_name: google-dorking-flask
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "False"
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./run.py:/app/run.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dorking-network
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: google-dorking-worker
    command: python worker.py
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./app:/app/app
      - ./worker.py:/app/worker.py
    networks:
      - dorking-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  dorking-network:
    driver: bridge
